site_name: Data Party Logistics
site_url: https://loicns.github.io/data-party-logistics
site_description: "Global port congestion & vessel ETA platform"
repo_url: https://github.com/loicns/data-party-logistics
repo_name: loicns/data-party-logistics

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Product & Vision:
      - Product PRD: product/prd.md
      - Problem Framing: product/problem-framing.md
      - Coverage: product/coverage.md
      - Market Validation: product/market-validation.md
  - Architecture:
      - System Overview: architecture/system-overview.md
      - Data Flow: architecture/data-flow.md
      - Dashboard Publishing: architecture/dashboard-publishing.md
      - Athena Query Layer: architecture/athena-query-layer.md
      - NOAA Geofence Ingestion: architecture/noaa-geofence-ingestion.md
      - Real Geofences: architecture/real-geofences-implementation.md
  - Data Engineering:
      - Data Sources: data/data-sources.md
      - Warehouse Schema: data/warehouse-schema.md
      - Pipeline Explorer: data/pipeline-explorer.md
      - Data Dictionary: data/data-dictionary.md
  - Machine Learning:
      - Model Card: ml/model-card.md
      - Event Intelligence: ml/event-intelligence.md
  - Operations & Security:
      - IAM And Identity: operations/iam-and-identity.md
      - Secrets And Environments: operations/secrets-and-environments.md
      - Monitoring And Alarms: operations/monitoring-and-alarms.md
      - Serverless Status And Costs: operations/serverless-status-and-costs.md
      - Runbook: operations/runbook.md
      - Incidents:
          - AIS Outage: operations/incidents/2026-06-11-ais-outage.md
  - Logs & Backlog:
      - Learning Journal: learning-journal/index.md
      - Blog: blog/index.md
      - Backlog: decisions/backlog.md
  - Planning:
      - Implementation Plan: planning/implementation_plan.md
      - Tasks: planning/task.md
      - Walkthrough: planning/walkthrough.md
