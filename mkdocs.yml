site_name: Data Party Logistics
site_url: https://loicns.github.io/data-party-logistics
site_description: "Global port congestion & vessel ETA platform"
repo_url: https://github.com/loicns/data-party-logistics
repo_name: loicns/data-party-logistics

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Pipeline Explorer: pipeline-explorer.md
  - Secrets And Environments: secrets-and-environments.md
  - Product:
      - Product PRD: 07-product-prd.md
      - Model Card: model-card.md
      - Coverage: coverage.md
      - Event Intelligence Layer: event-intelligence.md
      - Event-Aware Dashboard Task List: 22-event-aware-dashboard-task-list.md
      - Mid-Term Prediction Plan: 23-mid-term-prediction-plan.md
      - Current State Audit: 08-current-state-audit.md
      - Market Validation And Reach Plan: 21-market-validation-and-reach-plan.md
      - Next Week Demo Calendar: 09-next-week-demo-calendar.md
      - Serverless Pilot: 12-serverless-pilot.md
      - Serverless Status And Cost Forecast: 13-serverless-status-and-costs.md
  - Architecture:
      - System Architecture Overview: 14-system-architecture-overview.md
      - Data Flow And Storage Contract: 15-data-flow-and-storage-contract.md
      - Dashboard Publishing Architecture: 16-dashboard-publishing-architecture.md
      - Monitoring And Alarm Semantics: 17-monitoring-and-alarm-semantics.md
      - IAM And Deployment Identity: 18-iam-and-deployment-identity.md
      - Athena Query Layer Guide: 19-athena-query-layer-guide.md
      - Dual Runtime Implementation: 20-dual-runtime-implementation.md
      - Warehouse Schema: 04-warehouse-schema.md
      - Problem Framing: 01-problem-framing.md
      - Data Sources: 02-data-sources.md
      - EC2 Ingestion Runbook: 03-ec2-ingestion-runbook.md
      - EC2 Ingestion Explained: 04-ec2-ingestion-implementation-explained.md
      - Ingestion Architecture Options: 05-ingestion-architecture-options.md
      - EC2 Shutdown And ML Handoff: 06-ec2-stop-and-ml-handoff.md
      - NOAA Geofence Ingestion: noaa-geofence-ingestion.md
      - Real Geofences Implementation: real-geofences-implementation.md
  - Operations:
      - Cloud Go-Live Plan: 11-cloud-go-live-plan.md
      - Vessel Export Implementation: 10-vessel-export-implementation.md
      - Data Dictionary: blueprint/10-DATA-DICTIONARY.md
      - Pilot Runbook: blueprint/08-RUNBOOK.md
      - AIS Outage Incident: incidents/2026-06-11-ais-outage.md
  - Learning Journal:
      - Overview: learning-journal/index.md
  - Blog:
      - blog/index.md
  - Backlog:
      - decisions/backlog.md
