name: Deploy Serverless Pilot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "template.yaml"
      - "requirements.txt"
      - "requirements-predict.txt"
      - "Makefile"
      - "serverless/**"
      - "models/**"
      - "athena/**"
      - "vendor/**"
      - "ingestion/clients/ais_stream.py"
      - "ingestion/clients/noaa_tides.py"
      - "ingestion/clients/weather.py"
      - "ingestion/config.py"
      - "ingestion/port_loader.py"
      - "ingestion/s3_writer.py"
      - "warehouse/seeds/un_locode.csv"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STACK_NAME: dpl-serverless-pilot
      AWS_REGION: eu-west-3
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM
        uses: aws-actions/setup-sam@v2

      - name: Build SAM app
        run: sam build --template-file template.yaml

      # Refuse to ship host-arch native wheels — a macOS/x86_64 pydantic_core
      # on the arm64 Lambdas caused a 2-day silent AIS ingestion outage.
      - name: Verify native wheels are Linux arm64
        run: scripts/check_wheel_arch.sh

      - name: Deploy SAM app
        run: >
          sam deploy
          --stack-name "$STACK_NAME"
          --region "$AWS_REGION"
          --capabilities CAPABILITY_IAM
          --resolve-s3
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides
          AlertEmail="${{ secrets.DPL_ALERT_EMAIL }}"
          AisStreamApiKey="${{ secrets.AISSTREAM_API_KEY }}"
          PublicDashboardBucketName="${{ secrets.DPL_DASHBOARD_BUCKET }}"
          PublicDashboardDistributionId="${{ secrets.DPL_CLOUDFRONT_DISTRIBUTION_ID }}"

      # Post-deploy smoke test: invoke the freshness Lambda (read-only — it
      # only inspects S3 object ages). Catches ImportModuleError / wrong-arch /
      # missing-bundle regressions in CI instead of silently in production.
      # Also validates that the partition-aware probe returns a recent AIS age
      # (< 120 min) so a stale-freshness regression doesn't slip past CI.
      - name: Smoke test deployed Lambda
        run: |
          aws lambda invoke --function-name "$STACK_NAME-freshness" \
            --region "$AWS_REGION" /tmp/smoke.json
          cat /tmp/smoke.json
          python3 -c "
          import json
          out = json.load(open('/tmp/smoke.json'))
          assert 'errorMessage' not in out, f'Lambda errored: {out}'
          ages = out.get('ages_minutes', {})
          ais_age = ages.get('AisFreshnessMinutes')
          if ais_age is not None:
              assert ais_age < 120, \
                  f'AIS age {ais_age:.1f} min exceeds 120 min threshold — partition probe may be broken'
              print(f'AIS age: {ais_age:.1f} min — OK')
          print('smoke test OK')
          "
