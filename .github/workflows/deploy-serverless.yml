name: Deploy Serverless Pilot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "template.yaml"
      - "requirements.txt"
      - "serverless/**"
      - "ingestion/clients/ais_stream.py"
      - "ingestion/clients/noaa_tides.py"
      - "ingestion/clients/weather.py"
      - "ingestion/config.py"
      - "ingestion/port_loader.py"
      - "ingestion/s3_writer.py"
      - "warehouse/seeds/un_locode.csv"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STACK_NAME: dpl-serverless-pilot
      AWS_REGION: eu-west-3
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM
        uses: aws-actions/setup-sam@v2

      - name: Build SAM app
        run: sam build --template-file template.yaml

      - name: Deploy SAM app
        run: >
          sam deploy
          --stack-name "$STACK_NAME"
          --region "$AWS_REGION"
          --capabilities CAPABILITY_IAM
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides
          AlertEmail="${{ secrets.DPL_ALERT_EMAIL }}"
          AisStreamApiKey="${{ secrets.AISSTREAM_API_KEY }}"
