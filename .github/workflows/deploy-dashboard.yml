name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "dashboard-v2/**"
  workflow_dispatch:          # lets you trigger manually from GitHub UI

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard-v2/package-lock.json

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Lint
        working-directory: dashboard-v2
        run: |
          npm ci
          npm run lint

      # ── Deploy (Vercel CLI handles build + publish) ────────────────────────
      # Secrets needed in GitHub → Settings → Secrets → Actions:
      #   VERCEL_TOKEN      → vercel.com/account/tokens
      #   VERCEL_ORG_ID     → from dashboard-v2/.vercel/project.json  (orgId)
      #   VERCEL_PROJECT_ID → from dashboard-v2/.vercel/project.json  (projectId)
      - name: Deploy to Vercel (production)
        working-directory: dashboard-v2
        run: npx vercel --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
